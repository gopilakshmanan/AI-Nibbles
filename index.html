<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Nibbles Game</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        h1 {
            margin-bottom: 5px;
            letter-spacing: 2px;
        }
        #score {
            font-size: 24px;
            margin-bottom: 15px;
        }
        canvas {
            border: 4px solid #00ff00;
            background-color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }
        .instructions {
            margin-top: 15px;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1>NIBBLES</h1>
    <div id="score">Score: 0</div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="instructions">Use Arrow keys or WASD to move.</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [
            { x: 10, y: 10 },
            { x: 9, y: 10 },
            { x: 8, y: 10 }
        ];
        let food = { x: 5, y: 5 };
        let dx = 1; // Horizontal velocity
        let dy = 0; // Vertical velocity
        let score = 0;
        let changingDirection = false;
        let isGameOver = false;

        // Main game interval loop (runs every 100ms)
        document.addEventListener("keydown", handleKeyPress);
        createFood();
        setInterval(update, 100);

        function update() {
            if (isGameOver) return;

            if (hasGameEnded()) {
                isGameOver = true;
                drawGameOver();
                return;
            }

            changingDirection = false;
            clearCanvas();
            drawFood();
            moveSnake();
            drawSnake();
        }

        function clearCanvas() {
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                // Bright green for the head, slightly darker for the tail segments
                ctx.fillStyle = index === 0 ? "#00ff00" : "#00aa00";
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });
        }

        function moveSnake() {
            // Calculate where the new head will be
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            // Check if snake ate the food
            if (snake[0].x === food.x && snake[0].y === food.y) {
                score += 10;
                scoreElement.innerText = "Score: " + score;
                createFood();
            } else {
                // Remove the tail element to maintain length if no food was eaten
                snake.pop();
            }
        }

        function createFood() {
            let foodOnSnake = true;
            
            // Generate food coordinates and make sure they don't land on the snake
            while (foodOnSnake) {
                food.x = Math.floor(Math.random() * tileCount);
                food.y = Math.floor(Math.random() * tileCount);
                foodOnSnake = snake.some(part => part.x === food.x && part.y === food.y);
            }
        }

        function drawFood() {
            ctx.fillStyle = "#ff3333";
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }

        function handleKeyPress(event) {
            if (isGameOver && event.key === " ") {
                resetGame();
                return;
            }

            if (changingDirection) return;

            const keyPressed = event.key.toLowerCase();
            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            // Handle direction changes while blocking reverse-direction suicide
            if ((keyPressed === "arrowleft" || keyPressed === "a") && !goingRight) {
                dx = -1;
                dy = 0;
                changingDirection = true;
            }
            if ((keyPressed === "arrowup" || keyPressed === "w") && !goingDown) {
                dx = 0;
                dy = -1;
                changingDirection = true;
            }
            if ((keyPressed === "arrowright" || keyPressed === "d") && !goingLeft) {
                dx = 1;
                dy = 0;
                changingDirection = true;
            }
            if ((keyPressed === "arrowdown" || keyPressed === "s") && !goingUp) {
                dx = 0;
                dy = 1;
                changingDirection = true;
            }
        }

        function hasGameEnded() {
            // Self collision (starting from index 4 because it's impossible to hit indices 1-3)
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }

            // Wall collisions
            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x >= tileCount;
            const hitTopWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y >= tileCount;

            return hitLeftWall || hitRightWall || hitTopWall || hitBottomWall;
        }

        function drawGameOver() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "#ff3333";
            ctx.font = "bold 30px 'Courier New'";
            ctx.textAlign = "center";
            ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 10);
            
            ctx.fillStyle = "#ffffff";
            ctx.font = "16px 'Courier New'";
            ctx.fillText("Press SPACE to Restart", canvas.width / 2, canvas.height / 2 + 30);
        }

        function resetGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            dx = 1;
            dy = 0;
            score = 0;
            scoreElement.innerText = "Score: " + score;
            createFood();
            isGameOver = false;
        }
    </script>
</body>
</html>
